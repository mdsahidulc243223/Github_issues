<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Github Issues Tracker</title>
     <link rel="shortcut icon" href="./assets/github-logo.png" type="image/x-icon">
     <!-- font Awesome -->
     <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
     <!-- Tailwind + daisy ui -->
      <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- navbar -->
<div class="navbar bg-base-100 shadow-sm flex items-center">
  <div class="flex-1">
    <div class="flex items-center">
    <img class="w-10" src="./assets/github-logo.png">
   <h2 class=" font-bold ml-2 item-center">GitHub Issues Tracker</h2>
    </div>

  </div>
  <div class="flex gap-2">
    <input type="text" placeholder="Search issues" class="input input-bordered w-24 md:w-auto" />
      </div>
      <h2 class="btn ml-[5px] bg-primary text-white"> <i class="fa-solid fa-plus"></i>New Issue</h2>
</div>
  <section class="md:w-[1110px] bg-gray-100 mx-auto mt-5 w-11/12">
    <button onclick="toggleStyle('All')" id="All-btn" class="btn bg-black text-white ">All</button>
    <button onclick="toggleStyle('Open')" id="Open-btn" class="btn">Open</button>
    <button onclick="toggleStyle('Closed')" id="Close-btn" class="btn">Closed</button>
  </section>
  <section class="bg-gray-100 p-3 w-11/12 mx-auto my-10 ">
     <div class="issue-count flex items-center gap-4">
      <img src="./assets/Aperture.png">
      <div>
        <h2  id="count" class="  font-bold text-2xl"> 50 Issues</h2>
        <p>Track and manage your project issues</p>
      </div>
      
    </div>
  </section>
  <section  id="container" class="bg-gray-100 grid grid-cols-2 md:grid-cols-4 gap-4 py-10 w-11/12 mx-auto my-10">

  </section>
  <script src="./container.js"></script>
</body>
</html>
